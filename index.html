<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0c0c0c;
      --fg:       #f5f5f5;
      --card:     #161616;
      --muted-fg: #888888;
      --primary:  #e8351a;
      --secondary:#1f1f1f;
      --border:   rgba(255,255,255,0.08);
      --radius:   12px;
      --pull-color: #3b82f6;
      --legs-color: #22c55e;
    }
    html, body { background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    header { position: sticky; top: 0; z-index: 20; background: rgba(12,12,12,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 512px; margin: 0 auto; padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo svg { color: var(--primary); flex-shrink: 0; }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 0.12em; color: var(--fg); }

    .header-right { display: flex; align-items: center; gap: 12px; }

    /* rest selector */
    .rest-selector { display: flex; align-items: center; gap: 6px; }
    .rest-selector svg { color: var(--muted-fg); flex-shrink: 0; }
    .rest-btns { display: flex; gap: 4px; }
    .rest-dur-btn {
      padding: 3px 8px; border-radius: 6px; border: none;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
      font-size: 0.78rem; letter-spacing: 0.05em; cursor: pointer;
      background: var(--secondary); color: var(--muted-fg);
      transition: background 0.15s, color 0.15s;
    }
    .rest-dur-btn:hover { color: var(--fg); }
    .rest-dur-btn.active { background: var(--primary); color: #fff; }

    .btn-reset { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--muted-fg); background: none; border: none; cursor: pointer; transition: color 0.2s; font-family: 'Inter', sans-serif; }
    .btn-reset:hover { color: var(--primary); }

    .tabs { max-width: 512px; margin: 0 auto; padding: 10px 16px 14px; display: flex; gap: 8px; }
    .tab { flex: 1; padding: 8px 0; border-radius: 8px; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.18em; cursor: pointer; transition: background 0.2s, color 0.2s; background: var(--secondary); color: var(--muted-fg); }
    .tab:hover { color: var(--fg); }
    .tab.active { background: var(--primary); color: #fff; }

    .hero { max-width: 512px; margin: 0 auto; padding: 24px 16px 12px; }
    .hero-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .hero-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 3rem; color: var(--primary); line-height: 1; }
    .hero-chevron { color: var(--primary); opacity: 0.6; margin-top: 4px; }
    .hero-tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.22em; margin-bottom: 16px; }

    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .progress-track { flex: 1; height: 6px; border-radius: 999px; background: var(--secondary); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.5s ease; }
    .progress-label { font-size: 0.72rem; color: var(--muted-fg); font-variant-numeric: tabular-nums; width: 60px; text-align: right; }
    .complete-msg { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; color: var(--primary); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; display: none; }
    .complete-msg.visible { display: block; }

    .exercise-list { max-width: 512px; margin: 0 auto; padding: 0 16px 120px; display: flex; flex-direction: column; gap: 12px; }

    /* warm-up section */
    .warmup-section { max-width: 512px; margin: 0 auto; padding: 0 16px 4px; }
    .warmup-card { border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); padding: 14px 16px; }
    .warmup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; cursor: pointer; user-select: none; }
    .warmup-header svg.icon { color: var(--primary); flex-shrink: 0; }
    .warmup-title-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg); }
    .warmup-subtitle { font-size: 0.7rem; color: var(--muted-fg); margin-left: auto; }
    .warmup-chevron { margin-left: auto; color: var(--muted-fg); transition: transform 0.2s; flex-shrink: 0; }
    .warmup-chevron.open { transform: rotate(180deg); }
    .warmup-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .warmup-list.collapsed { display: none; }
    .warmup-item { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; font-size: 0.82rem; padding: 2px 0; }
    .warmup-item-name { color: var(--fg); }
    .warmup-item-detail { color: var(--muted-fg); font-size: 0.72rem; white-space: nowrap; }
    .warmup-note { font-size: 0.68rem; color: var(--muted-fg); margin-top: 10px; font-style: italic; }

    .ex-card { border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); transition: border-color 0.3s, background 0.3s; }
    .ex-card.done { border-color: rgba(232,53,26,0.4); background: rgba(232,53,26,0.05); }
    .ex-header { padding: 16px 16px 10px; display: flex; align-items: flex-start; gap: 12px; }
    .ex-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.5rem; line-height: 1; margin-top: 2px; color: rgba(255,255,255,0.15); font-variant-numeric: tabular-nums; flex-shrink: 0; transition: color 0.3s; }
    .ex-card.done .ex-num { color: var(--primary); }
    .ex-body { flex: 1; min-width: 0; }
    .ex-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ex-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 0.04em; line-height: 1.2; color: var(--fg); }
    .ex-subtitle { font-size: 0.68rem; color: var(--muted-fg); background: var(--secondary); padding: 2px 8px; border-radius: 999px; }
    .ex-meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .ex-reps { font-size: 0.72rem; font-weight: 600; color: var(--primary); font-variant-numeric: tabular-nums; }
    .ex-targets { font-size: 0.72rem; color: var(--muted-fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ex-check-icon { flex-shrink: 0; margin-top: 2px; color: var(--primary); display: none; }
    .ex-card.done .ex-check-icon { display: block; }

    .set-row { padding: 0 16px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .set-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--secondary); color: var(--muted-fg); font-size: 0.72rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s; }
    .set-btn:hover { border-color: rgba(232,53,26,0.5); color: var(--fg); }
    .set-btn.checked { background: var(--primary); border-color: var(--primary); color: #fff; }
    .sets-left { font-size: 0.72rem; color: var(--muted-fg); margin-left: 4px; }

    .rest-overlay { position: fixed; bottom: 76px; left: 0; right: 0; z-index: 50; display: flex; justify-content: center; padding: 0 16px; pointer-events: none; opacity: 0; transform: translateY(16px); transition: opacity 0.25s, transform 0.25s; }
    .rest-overlay.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
    .rest-card { width: 100%; max-width: 512px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.7); padding: 16px; display: flex; align-items: center; gap: 16px; }
    .rest-timer-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .rest-timer-wrap svg { transform: rotate(-90deg); width: 64px; height: 64px; }
    .rest-ring-bg { fill: none; stroke: #222; stroke-width: 4; }
    .rest-ring-fg { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    .rest-seconds { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.3rem; color: var(--fg); font-variant-numeric: tabular-nums; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-tag { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .rest-tag svg { color: var(--primary); }
    .rest-tag-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.72rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.18em; }
    .rest-exercise { font-size: 0.875rem; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rest-sub { font-size: 0.72rem; color: var(--muted-fg); margin-top: 2px; }
    .btn-dismiss { flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--muted-fg); padding: 8px; border-radius: 8px; transition: color 0.2s, background 0.2s; display: flex; align-items: center; }
    .btn-dismiss:hover { color: var(--fg); background: var(--secondary); }
    svg { display: inline-block; vertical-align: middle; }

    /* tools button */
    .btn-tools { display: flex; align-items: center; justify-content: center; background: var(--secondary); border: none; color: var(--muted-fg); padding: 6px; border-radius: 8px; cursor: pointer; transition: color 0.2s, background 0.2s; }
    .btn-tools:hover { color: var(--fg); background: #262626; }

    /* tools modal */
    .tools-overlay { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 16px; }
    .tools-overlay.visible { display: flex; }
    .tools-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
    .tools-modal { position: relative; width: 100%; max-width: 400px; background: #151515; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.8); padding: 18px; }
    .tools-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .tools-tabs { display: flex; gap: 6px; background: var(--secondary); padding: 4px; border-radius: 10px; }
    .tools-tab { padding: 7px 16px; border-radius: 8px; border: none; background: transparent; color: var(--muted-fg); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .tools-tab.active { background: var(--primary); color: #fff; }
    .tools-close { background: none; border: none; color: var(--muted-fg); cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; transition: color 0.2s, background 0.2s; }
    .tools-close:hover { color: var(--fg); background: var(--secondary); }

    .tools-panel { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .big-display { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 3.6rem; color: var(--fg); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; line-height: 1; }
    .big-display.finished { color: var(--primary); }

    .timer-manual { display: flex; align-items: flex-end; gap: 8px; }
    .time-input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .time-input-group label { font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted-fg); font-weight: 700; }
    .time-input-group input { width: 64px; text-align: center; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.3rem; padding: 8px 0; font-variant-numeric: tabular-nums; -moz-appearance: textfield; }
    .time-input-group input::-webkit-outer-spin-button, .time-input-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .time-input-group input:focus { outline: none; border-color: var(--primary); }
    .time-colon { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--muted-fg); padding-bottom: 8px; }
    .set-btn { flex: 0 0 auto; padding: 10px 18px; align-self: flex-end; }

    .tools-controls { display: flex; gap: 10px; width: 100%; }
    .tools-btn { flex: 1; padding: 12px 0; border-radius: 10px; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.08em; cursor: pointer; background: var(--secondary); color: var(--fg); transition: background 0.2s, opacity 0.15s; }
    .tools-btn:active { opacity: 0.75; }
    .tools-btn.primary { background: var(--primary); color: #fff; }
    .tools-btn.running { background: #3a3a3a; }

    .laps-list { width: 100%; max-height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .lap-row { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--secondary); border-radius: 8px; font-size: 0.8rem; color: var(--muted-fg); font-variant-numeric: tabular-nums; }
    .lap-row span:first-child { color: var(--fg); font-weight: 600; }

    /* history / streaks / calendar modal */
    .history-overlay { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 16px; }
    .history-overlay.visible { display: flex; }
    .history-modal { position: relative; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; background: #151515; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.8); padding: 18px; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .history-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }

    .streak-stats { display: flex; gap: 10px; margin-bottom: 18px; }
    .stat-box { flex: 1; background: var(--secondary); border-radius: 10px; padding: 12px 8px; text-align: center; }
    .stat-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.6rem; color: var(--primary); line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 0.6rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav-btn { background: var(--secondary); border: none; color: var(--muted-fg); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s; }
    .cal-nav-btn:hover { color: var(--fg); background: #262626; }
    .cal-month-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.06em; color: var(--fg); text-transform: uppercase; }

    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
    .cal-weekday { text-align: center; font-size: 0.62rem; color: var(--muted-fg); font-weight: 700; letter-spacing: 0.04em; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 0.72rem; color: var(--muted-fg); background: var(--secondary); position: relative; }
    .cal-cell.outside { opacity: 0.25; }
    .cal-cell.today { box-shadow: inset 0 0 0 2px var(--primary); color: var(--fg); }
    .cal-cell.has-activity { color: var(--fg); }
    .cal-dots { display: flex; gap: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-dot.push { background: var(--primary); }
    .cal-dot.pull { background: var(--pull-color); }
    .cal-dot.legs { background: var(--legs-color); }

    .cal-legend { display: flex; gap: 14px; justify-content: center; margin-top: 14px; }
    .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--muted-fg); }
    .cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cal-legend-dot.push { background: var(--primary); }
    .cal-legend-dot.pull { background: var(--pull-color); }
    .cal-legend-dot.legs { background: var(--legs-color); }

    /* ---------- New layout: streak card, categories, screens, bottom nav ---------- */

    .screen { max-width: 512px; margin: 0 auto; padding: 16px 16px 100px; }
    .screen.hidden { display: none; }

    /* streak card (replaces hero) */
    .streak-card { border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); padding: 18px; margin-bottom: 16px; }
    .streak-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .streak-flame { color: var(--primary); flex-shrink: 0; }
    .streak-count { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2.4rem; color: var(--fg); line-height: 1; }
    .streak-count-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 2px; }

    .week-progress-track { flex: 1; height: 6px; border-radius: 999px; background: var(--secondary); overflow: hidden; }
    .week-progress-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.5s ease; }

    .week-checks { display: flex; gap: 10px; margin-top: 14px; }
    .week-check-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 6px; border-radius: 10px; background: var(--secondary); }
    .week-check-item .check-circle { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.06); color: var(--muted-fg); transition: background 0.3s, color 0.3s; }
    .week-check-item.complete .check-circle { background: var(--primary); color: #fff; }
    .week-check-item.complete.pull .check-circle { background: var(--pull-color); }
    .week-check-item.complete.legs .check-circle { background: var(--legs-color); }
    .week-check-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted-fg); text-transform: uppercase; }

    .streak-goal-text { font-size: 0.72rem; color: var(--muted-fg); text-align: center; margin-top: 12px; }

    /* category buttons */
    .category-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .category-btn { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); cursor: pointer; text-align: left; transition: border-color 0.2s, background 0.2s; }
    .category-btn:hover { border-color: rgba(232,53,26,0.4); }
    .category-btn.active { background: rgba(232,53,26,0.08); border-color: var(--primary); }
    .category-btn.active.pull-active { background: rgba(59,130,246,0.08); border-color: var(--pull-color); }
    .category-btn.active.legs-active { background: rgba(34,197,94,0.08); border-color: var(--legs-color); }
    .category-emoji { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
    .category-info { flex: 1; min-width: 0; }
    .category-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: 0.04em; color: var(--fg); }
    .category-sub { font-size: 0.72rem; color: var(--muted-fg); margin-top: 2px; }
    .category-chevron { color: var(--muted-fg); flex-shrink: 0; transition: transform 0.2s, color 0.2s; }
    .category-btn.active .category-chevron { color: var(--primary); transform: rotate(90deg); }

    /* workout toolbar (rest duration + reset), sits above warm-up */
    .workout-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); }

    /* bottom navigation */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(12,12,12,0.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; }
    .bottom-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 12px; background: none; border: none; color: var(--muted-fg); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .bottom-nav-btn.active { color: var(--primary); }
    .bottom-nav-btn svg { flex-shrink: 0; }

    /* history / calendar screens reuse existing card styles */
    .screen-card { border-radius: 16px; border: 1px solid var(--border); background: #151515; box-shadow: 0 4px 24px rgba(0,0,0,0.4); padding: 18px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4M6 9h12M6 15h12"/>
      </svg>
      <span class="logo-text">WORKOUT TRACKER</span>
    </div>
  </div>
</header>

<div id="screen-workout" class="screen">

  <div class="streak-card">
    <div class="streak-card-top">

  const restAudio = new Audio(AUDIO_DATA_URI);
  restAudio.preload = "auto";
  let alertPlayed = false;

  // Unlock audio playback on first user interaction (required by mobile/browser autoplay policies)
  function unlockAudio() {
    restAudio.play().then(() => { restAudio.pause(); restAudio.currentTime = 0; }).catch(() => {});
    document.removeEventListener("click", unlockAudio);
    document.removeEventListener("touchstart", unlockAudio);
  }
  document.addEventListener("click", unlockAudio, { once: true });
  document.addEventListener("touchstart", unlockAudio, { once: true });

  // (init calls moved to the end of the script, after all consts/functions are declared)

  function renderRestDurBtns() {
    const c = document.getElementById("restDurBtns");
    c.innerHTML = "";
    REST_OPTIONS.forEach(dur => {
      const b = document.createElement("button");
      b.className = "rest-dur-btn" + (dur === restDuration ? " active" : "");
      b.textContent = dur + "s";
      b.onclick = () => selectRestDuration(dur);
      c.appendChild(b);
    });
  }

  function selectRestDuration(dur) {
    restDuration = dur;
    // if timer is active, cancel and reset
    if (restInterval) {
      clearInterval(restInterval);
      restInterval = null;
      stopAlert();
      document.getElementById("restOverlay").classList.remove("visible");
    }
    restSecs = dur;
    renderRestDurBtns();
    updateRestUI();
    saveState();
  }

  const CATEGORY_EMOJI = { push: "💪", pull: "🔵", legs: "🦵" };
  const CATEGORY_SUB = { push: "Chest, Shoulders, Triceps", pull: "Back, Biceps, Lats", legs: "Quads, Glutes, Hamstrings" };

  function renderTabs() {
    const c = document.getElementById("categoryGrid");
    c.innerHTML = "";
    workouts.forEach(w => {
      const isActive = w.id === activeDay;
      const b = document.createElement("button");
      b.className = "category-btn" + (isActive ? " active" : "") + (isActive && w.id === "pull" ? " pull-active" : "") + (isActive && w.id === "legs" ? " legs-active" : "");
      b.innerHTML = `
        <span class="category-emoji">${CATEGORY_EMOJI[w.id] || ""}</span>
        <div class="category-info">
          <div class="category-name">${w.label}</div>
          <div class="category-sub">${CATEGORY_SUB[w.id] || ""}</div>
        </div>
        <svg class="category-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      `;
      b.onclick = () => { activeDay = w.id; renderTabs(); renderDay(); saveState(); };
      c.appendChild(b);
    });
  }

  function renderDay() {
    const day = workouts.find(w => w.id === activeDay);
    document.getElementById("heroTitle").textContent = day.type;
    document.getElementById("heroTagline").textContent = day.tagline;
    updateProgress();
    renderWarmup();
    renderExercises();
    renderStreakCard();
  }

  function renderWarmup() {
    const day = workouts.find(w => w.id === activeDay);
    const container = document.getElementById("warmupSection");
    if (!day.warmup || !day.warmup.length) { container.innerHTML = ""; return; }

    const itemsHtml = day.warmup.map(w => `
      <li class="warmup-item">
        <span class="warmup-item-name">${w.name}</span>
        <span class="warmup-item-detail">${w.detail}</span>
      </li>
    `).join("");

    container.innerHTML = `
      <div class="warmup-card">
        <div class="warmup-header" onclick="toggleWarmup()">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>
          </svg>
          <span class="warmup-title-text">Warm-Up${day.warmupTitle ? " — " + day.warmupTitle : ""}</span>
          <svg class="warmup-chevron${warmupCollapsed ? "" : " open"}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <ul class="warmup-list${warmupCollapsed ? " collapsed" : ""}" id="warmupList">
          ${itemsHtml}
        </ul>
        <div class="warmup-note${warmupCollapsed ? " " : ""}" style="${warmupCollapsed ? "display:none;" : ""}">Do 1–2 sets of each exercise.</div>
      </div>
    `;
  }

  function toggleWarmup() {
    warmupCollapsed = !warmupCollapsed;
    renderWarmup();
    saveState();
  }

  function updateProgress() {
    const day = workouts.find(w => w.id === activeDay);
    const total = day.exercises.reduce((a,ex) => a + ex.sets, 0);
    const done  = day.exercises.reduce((a,ex) => a + (setStates[ex.id]||[]).filter(Boolean).length, 0);
    const pct   = total > 0 ? (done/total)*100 : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = done + "/" + total + " sets";
    document.getElementById("completeMsg").classList.toggle("visible", pct === 100);
    if (pct === 100) markDayComplete(day.id);
  }

  function getDateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function markDayComplete(workoutId) {
    const key = getDateKey(new Date());
    if (!workoutHistory[key]) workoutHistory[key] = [];
    if (!workoutHistory[key].includes(workoutId)) {
      workoutHistory[key].push(workoutId);
      saveState();
    }
  }

  function renderExercises() {
    const day = workouts.find(w => w.id === activeDay);
    const container = document.getElementById("exerciseList");
    container.innerHTML = "";
    day.exercises.forEach(ex => {
      const exSets = setStates[ex.id] || new Array(ex.sets).fill(false);
      const doneCount = exSets.filter(Boolean).length;
      const isComplete = doneCount === ex.sets;

      const card = document.createElement("div");
      card.className = "ex-card" + (isComplete ? " done" : "");

      card.innerHTML = `
        <div class="ex-header">
          <span class="ex-num">${String(ex.number).padStart(2,"0")}</span>
          <div class="ex-body">
            <div class="ex-name-row">
              <span class="ex-name">${ex.name}</span>
              ${ex.subtitle ? `<span class="ex-subtitle">${ex.subtitle}</span>` : ""}
            </div>
            <div class="ex-meta">
              <span class="ex-reps">${ex.sets} &times; ${ex.reps} reps</span>
              <span class="ex-targets">${ex.targets}</span>
            </div>
          </div>
          <div class="ex-check-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
        </div>
        <div class="set-row" id="sets-${ex.id}"></div>
      `;

      const setRow = card.querySelector(".set-row");
      exSets.forEach((checked, idx) => {
        const btn = document.createElement("button");
        btn.className = "set-btn" + (checked ? " checked" : "");
        btn.innerHTML = (checked
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`
        ) + `<span>Set ${idx+1}</span>`;
        btn.onclick = () => toggleSet(ex.id, idx);
        setRow.appendChild(btn);
      });

      if (doneCount > 0 && doneCount < ex.sets) {
        const s = document.createElement("span");
        s.className = "sets-left";
        s.textContent = (ex.sets - doneCount) + " left";
        setRow.appendChild(s);
      }

      container.appendChild(card);
    });
  }

  function toggleSet(exId, idx) {
    const day = workouts.find(w => w.id === activeDay);
    const ex = day.exercises.find(e => e.id === exId);
    if (!setStates[exId]) setStates[exId] = new Array(ex.sets).fill(false);
    const wasChecked = setStates[exId][idx];
    setStates[exId][idx] = !wasChecked;
    if (!wasChecked) startRest(ex.name + " — Set " + (idx+1));
    renderExercises();
    updateProgress();
    renderStreakCard();
    saveState();
  }

  function resetDay() {
    const day = workouts.find(w => w.id === activeDay);
    day.exercises.forEach(ex => { setStates[ex.id] = new Array(ex.sets).fill(false); });
    dismissRest(); renderExercises(); updateProgress();
    renderStreakCard();
    saveState();
  }

  function startRest(label) {
    if (restInterval) clearInterval(restInterval);
    stopAlert();
    restSecs = restDuration;
    document.getElementById("restLabel").textContent = label;
    updateRestUI();
    document.getElementById("restOverlay").classList.add("visible");
    restInterval = setInterval(() => {
      restSecs--;
      if (restSecs === 5) playAlert();
      if (restSecs <= 0) {
        clearInterval(restInterval); restInterval = null;
        document.getElementById("restOverlay").classList.remove("visible");
        restSecs = restDuration; return;
      }
      updateRestUI();
    }, 1000);
  }

  function dismissRest() {
    if (restInterval) clearInterval(restInterval);
    restInterval = null; restSecs = restDuration;
    stopAlert();
    document.getElementById("restOverlay").classList.remove("visible");
    updateRestUI();
  }

  function playAlert() {
    try {
      restAudio.currentTime = 0;
      restAudio.play().catch(() => {});
      alertPlayed = true;
    } catch (e) {}
  }

  function stopAlert() {
    try {
      restAudio.pause();
      restAudio.currentTime = 0;
    } catch (e) {}
    alertPlayed = false;
  }

  function updateRestUI() {
    document.getElementById("restSeconds").textContent = restSecs;
    document.getElementById("restSub").textContent = restSecs > 0 ? restSecs + "s / " + restDuration + "s" : "Go!";
    const progress = ((restDuration - restSecs) / restDuration) * CIRC;
    const ring = document.getElementById("restRing");
    ring.setAttribute("stroke-dasharray", CIRC);
    ring.setAttribute("stroke-dashoffset", CIRC - progress);
  }

  // ---------- Tools panel (Timer & Stopwatch) ----------

  function switchToolsTab(tab) {
    const isTimer = tab === "timer";
    document.getElementById("tabTimerBtn").classList.toggle("active", isTimer);
    document.getElementById("tabStopwatchBtn").classList.toggle("active", !isTimer);
    document.getElementById("timerPanel").style.display = isTimer ? "flex" : "none";
    document.getElementById("stopwatchPanel").style.display = isTimer ? "none" : "flex";
  }

  function formatMinSec(totalSeconds) {
    const s = Math.max(0, totalSeconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
  }

  // --- Timer ---

  function syncTimerInputs() {
    const mins = Math.floor(timerTotal / 60);
    const secs = timerTotal % 60;
    document.getElementById("timerMinInput").value = mins;
    document.getElementById("timerSecInput").value = secs;
  }

  function applyManualTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; timerRunning = false; }
    stopAlert();
    let mins = parseInt(document.getElementById("timerMinInput").value, 10);
    let secs = parseInt(document.getElementById("timerSecInput").value, 10);
    if (isNaN(mins) || mins < 0) mins = 0;
    if (isNaN(secs) || secs < 0) secs = 0;
    if (secs > 59) secs = 59;
    let total = (mins * 60) + secs;
    if (total < 5) total = 5;
    timerTotal = total;
    timerRemaining = total;
    document.getElementById("timerStartBtn").textContent = "Start";
    document.getElementById("timerStartBtn").classList.remove("running");
    syncTimerInputs();
    updateTimerDisplay();
  }

  function toggleTimer() {
    if (timerRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  function startTimer() {
    if (timerRemaining <= 0) timerRemaining = timerTotal;
    timerRunning = true;
    document.getElementById("timerStartBtn").textContent = "Pause";
    document.getElementById("timerStartBtn").classList.add("running");
    setManualInputsDisabled(true);
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerRemaining--;
      if (timerRemaining === 5 && timerRemaining > 0) playAlert();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval); timerInterval = null;
        timerRunning = false;
        timerRemaining = 0;
        document.getElementById("timerStartBtn").textContent = "Start";
        document.getElementById("timerStartBtn").classList.remove("running");
        setManualInputsDisabled(false);
        playAlert();
        updateTimerDisplay();
        return;
      }
      updateTimerDisplay();
    }, 1000);
    updateTimerDisplay();
  }

  function pauseTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    stopAlert();
    document.getElementById("timerStartBtn").textContent = "Start";
    document.getElementById("timerStartBtn").classList.remove("running");
    setManualInputsDisabled(false);
  }

  function resetTimer() {
    pauseTimer();
    timerRemaining = timerTotal;
    syncTimerInputs();
    updateTimerDisplay();
  }

  function setManualInputsDisabled(disabled) {
    document.getElementById("timerMinInput").disabled = disabled;
    document.getElementById("timerSecInput").disabled = disabled;
  }

  function updateTimerDisplay() {
    const el = document.getElementById("timerDisplay");
    el.textContent = formatMinSec(timerRemaining);
    el.classList.toggle("finished", timerRemaining <= 0);
  }

  // --- Stopwatch ---

  function toggleStopwatch() {
    if (swRunning) {
      pauseStopwatch();
    } else {
      startStopwatch();
    }
  }

  function startStopwatch() {
    swRunning = true;
    swStartTs = Date.now();
    document.getElementById("swStartBtn").textContent = "Pause";
    document.getElementById("swStartBtn").classList.add("running");
    document.getElementById("swLapBtn").disabled = false;
    if (swInterval) clearInterval(swInterval);
    swInterval = setInterval(() => {
      updateStopwatchDisplay();
    }, 100);
  }

  function pauseStopwatch() {
    if (swInterval) clearInterval(swInterval);
    swInterval = null;
    swRunning = false;
    swElapsedMs += Date.now() - swStartTs;
    swStartTs = null;
    document.getElementById("swStartBtn").textContent = "Start";
    document.getElementById("swStartBtn").classList.remove("running");
    document.getElementById("swLapBtn").disabled = true;
    updateStopwatchDisplay();
  }

  function resetStopwatch() {
    if (swInterval) clearInterval(swInterval);
    swInterval = null;
    swRunning = false;
    swElapsedMs = 0;
    swStartTs = null;
    swLaps = [];
    document.getElementById("swStartBtn").textContent = "Start";
    document.getElementById("swStartBtn").classList.remove("running");
    document.getElementById("swLapBtn").disabled = true;
    renderLaps();
    updateStopwatchDisplay();
  }

  function lapStopwatch() {
    if (!swRunning) return;
    swLaps.unshift(getStopwatchMs());
    renderLaps();
  }

  function getStopwatchMs() {
    return swElapsedMs + (swRunning ? Date.now() - swStartTs : 0);
  }

  function formatStopwatch(ms) {
    const totalTenths = Math.floor(ms / 100);
    const tenths = totalTenths % 10;
    const totalSeconds = Math.floor(totalTenths / 10);
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0") + "." + tenths;
  }

  function updateStopwatchDisplay() {
    document.getElementById("stopwatchDisplay").textContent = formatStopwatch(getStopwatchMs());
  }

  function renderLaps() {
    const c = document.getElementById("lapsList");
    c.innerHTML = "";
    swLaps.forEach((ms, idx) => {
      const row = document.createElement("div");
      row.className = "lap-row";
      const lapNum = swLaps.length - idx;
      row.innerHTML = `<span>Lap ${lapNum}</span><span>${formatStopwatch(ms)}</span>`;
      c.appendChild(row);
    });
  }

  // ---------- History / Streaks / Calendar ----------

  // ---------- Bottom nav screen switching ----------

  function showScreen(name) {
    ["workout", "history", "calendar", "timer"].forEach(s => {
      document.getElementById("screen-" + s).classList.toggle("hidden", s !== name);
      document.getElementById("navBtn" + s.charAt(0).toUpperCase() + s.slice(1)).classList.toggle("active", s === name);
    });
    if (name === "history") renderHistoryStats();
    if (name === "calendar") {
      const now = new Date();
      calViewYear = now.getFullYear();
      calViewMonth = now.getMonth();
      renderCalendarScreen();
    }
  }

  function navigateMonth(delta) {
    calViewMonth += delta;
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    renderCalendarScreen();
  }

  function activeDatesSorted() {
    return Object.keys(workoutHistory).filter(k => workoutHistory[k] && workoutHistory[k].length).sort();
  }

  function computeCurrentStreak() {
    let streak = 0;
    let d = new Date();
    let key = getDateKey(d);
    if (!(workoutHistory[key] && workoutHistory[key].length)) {
      d.setDate(d.getDate() - 1);
    }
    while (true) {
      key = getDateKey(d);
      if (workoutHistory[key] && workoutHistory[key].length) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return streak;
  }

  function computeBestStreak() {
    const dates = activeDatesSorted();
    if (!dates.length) return 0;
    let best = 1, run = 1;
    for (let i = 1; i < dates.length; i++) {
      const prev = new Date(dates[i-1] + "T00:00:00");
      const cur = new Date(dates[i] + "T00:00:00");
      const diffDays = Math.round((cur - prev) / 86400000);
      if (diffDays === 1) { run++; } else { run = 1; }
      if (run > best) best = run;
    }
    return best;
  }

  function computeTotalWorkouts() {
    return Object.values(workoutHistory).reduce((a, arr) => a + (arr ? arr.length : 0), 0);
  }

  function getWeekCompletionStatus() {
    // Week runs Sunday - Saturday, matching the calendar grid.
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay());
    const status = { push: false, pull: false, legs: false };
    for (let i = 0; i < 7; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      const key = getDateKey(d);
      const entries = workoutHistory[key] || [];
      entries.forEach(id => { if (status.hasOwnProperty(id)) status[id] = true; });
    }
    return status;
  }

  function renderStreakCard() {
    document.getElementById("streakCount").textContent = computeCurrentStreak();
    const status = getWeekCompletionStatus();
    const doneCount = Object.values(status).filter(Boolean).length;
    document.getElementById("weekProgressFill").style.width = (doneCount / 3 * 100) + "%";

    const container = document.getElementById("weekChecks");
    container.innerHTML = "";
    [
      { id: "push", label: "Push" },
      { id: "pull", label: "Pull" },
      { id: "legs", label: "Legs" }
    ].forEach(item => {
      const isDone = status[item.id];
      const div = document.createElement("div");
      div.className = "week-check-item" + (isDone ? " complete" : "") + (isDone && item.id === "pull" ? " pull" : "") + (isDone && item.id === "legs" ? " legs" : "");
      div.innerHTML = `
        <span class="check-circle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span class="week-check-label">${item.label}</span>
      `;
      container.appendChild(div);
    });

    const goalText = document.getElementById("streakGoalText");
    goalText.textContent = doneCount >= 3
      ? "You crushed all 3 workouts this week! 🔥"
      : "Complete all 3 workouts this week";
  }

  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function renderHistoryStats() {
    document.getElementById("statCurrentStreak").textContent = computeCurrentStreak();
    document.getElementById("statBestStreak").textContent = computeBestStreak();
    document.getElementById("statTotalWorkouts").textContent = computeTotalWorkouts();
  }

  function renderCalendarScreen() {
    document.getElementById("calMonthLabel").textContent = MONTH_NAMES[calViewMonth] + " " + calViewYear;
    renderCalendarGrid();
  }

  function renderCalendarGrid() {
    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    const firstOfMonth = new Date(calViewYear, calViewMonth, 1);
    const startOffset = firstOfMonth.getDay(); // 0 = Sunday
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(calViewYear, calViewMonth, 0).getDate();
    const todayKey = getDateKey(new Date());

    const cells = [];

    // leading days from previous month
    for (let i = startOffset - 1; i >= 0; i--) {
      cells.push({ dayNum: daysInPrevMonth - i, outside: true, dateObj: null });
    }
    // days in current month
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ dayNum: d, outside: false, dateObj: new Date(calViewYear, calViewMonth, d) });
    }
    // trailing days to fill final week
    while (cells.length % 7 !== 0) {
      const nextDay = cells.length - (startOffset + daysInMonth) + 1;
      cells.push({ dayNum: nextDay, outside: true, dateObj: null });
    }

    cells.forEach(cell => {
      const el = document.createElement("div");
      let cls = "cal-cell";
      if (cell.outside) cls += " outside";

      let key = null;
      if (cell.dateObj) {
        key = getDateKey(cell.dateObj);
        if (key === todayKey) cls += " today";
      }

      const completed = key && workoutHistory[key] ? workoutHistory[key] : [];
      if (completed.length) cls += " has-activity";

      el.className = cls;
      const dotsHtml = completed.length
        ? `<div class="cal-dots">${completed.map(id => `<span class="cal-dot ${id}"></span>`).join("")}</div>`
        : "";
      el.innerHTML = `<span>${cell.dayNum}</span>${dotsHtml}`;
      grid.appendChild(el);
    });
  }

  // Init — runs last, after every const/function above has been declared,
  // so nothing here can hit a temporal-dead-zone reference error.
  renderRestDurBtns(); renderTabs(); renderDay(); renderStreakCard(); syncTimerInputs(); updateTimerDisplay(); updateStopwatchDisplay();
</script>
</body>
</html>
